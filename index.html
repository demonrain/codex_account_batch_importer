<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sub2API 账号批量管理工具</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Sub2API Account Tool</p>
        <h1>账号批量管理</h1>
        <p class="hero__text">
          选择本机账号 JSON 目录，本地解析预览后，直接调用 Sub2API 管理接口批量导入 OpenAI OAuth 账号。
        </p>
      </div>
      <div class="hero__panel">
        <div class="mini-stat">
          <span>文件</span>
          <strong id="statTotal">0</strong>
        </div>
        <div class="mini-stat">
          <span>可导入</span>
          <strong id="statImportable">0</strong>
        </div>
        <div class="mini-stat">
          <span>已选择</span>
          <strong id="statSelected">0</strong>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="card config-card">
        <div class="section-title">
          <div>
            <p class="eyebrow">Step 1</p>
            <h2>连接 Sub2API</h2>
          </div>
          <button id="saveConfigBtn" class="button button--ghost" type="button">保存配置</button>
        </div>

        <div class="form-grid">
          <label>
            <span>API 接口地址</span>
            <input id="apiBaseInput" type="url" placeholder="http://127.0.0.1:8080/api/v1">
          </label>
          <label>
            <span>Admin Token</span>
            <input id="adminTokenInput" type="password" placeholder="粘贴 JWT 或 Admin API Key">
          </label>
          <label>
            <span>Token 发送方式</span>
            <select id="authModeInput">
              <option value="bearer">Authorization: Bearer</option>
              <option value="apikey">x-api-key</option>
            </select>
          </label>
          <label>
            <span>账号并发</span>
            <input id="concurrencyInput" type="number" min="0" value="3">
          </label>
          <label>
            <span>账号优先级</span>
            <input id="priorityInput" type="number" min="0" value="50">
          </label>
          <label>
            <span>分组 ID</span>
            <input id="groupIdsInput" type="text" placeholder="可选，例如 1,2,3">
          </label>
        </div>

        <div class="switch-row">
          <label class="switch">
            <input id="updateExistingInput" type="checkbox" checked>
            <span>更新已存在账号</span>
          </label>
          <label class="switch">
            <input id="skipDefaultGroupInput" type="checkbox">
            <span>跳过默认分组绑定</span>
          </label>
          <label class="switch">
            <input id="autoPauseExpiredInput" type="checkbox" checked>
            <span>过期自动暂停</span>
          </label>
        </div>
      </section>

      <section class="workspace">
        <aside class="card side-card">
          <div class="section-title">
            <div>
              <p class="eyebrow">Step 2</p>
              <h2>读取账号文件</h2>
            </div>
          </div>

          <div class="button-stack">
            <button id="pickDirectoryBtn" class="button button--primary" type="button">
              选择 accounts 目录
            </button>
            <label class="button button--secondary file-button">
              选择多个 JSON 文件
              <input id="fileInput" type="file" accept=".json,application/json" multiple>
            </label>
          </div>

          <p class="hint">
            Chrome / Edge 支持直接选择目录。其他浏览器可用“选择多个 JSON 文件”。
          </p>

          <div class="status-box">
            <span>当前来源</span>
            <strong id="sourceLabel">尚未选择</strong>
          </div>

          <div class="quick-actions">
            <button id="selectAllBtn" class="button button--ghost" type="button">全选可导入</button>
            <button id="clearSelectionBtn" class="button button--ghost" type="button">清空选择</button>
          </div>

          <label class="search-box">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="邮箱、文件名、账号 ID">
          </label>
        </aside>

        <section class="card table-card">
          <div class="section-title section-title--table">
            <div>
              <p class="eyebrow">Step 3</p>
              <h2>预览并导入</h2>
            </div>
            <button id="importBtn" class="button button--danger" type="button" disabled>
              导入选中账号
            </button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>文件</th>
                  <th>账号信息</th>
                  <th>Token</th>
                  <th>过期时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="fileTableBody">
                <tr>
                  <td colspan="6" class="empty">请选择 JSON 文件</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="card result-card" id="resultCard" hidden>
        <div class="section-title">
          <div>
            <p class="eyebrow">Result</p>
            <h2>导入结果</h2>
          </div>
          <button id="clearResultBtn" class="button button--ghost" type="button">关闭结果</button>
        </div>
        <div class="result-summary" id="resultSummary"></div>
        <div class="result-list" id="resultList"></div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
